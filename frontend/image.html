<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteConvert - Image Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
  
  <script type="importmap">
  {
    "imports": {
      "js-yaml": "https://esm.sh/js-yaml@4.1.0",
      "papaparse": "https://esm.sh/papaparse@5.4.1",
      "jspdf": "https://esm.sh/jspdf@2.5.1"
    }
  }
  </script>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">LC</div>
        <div class="brand-info">
          <h1>LiteConvert</h1>
          <span class="version-tag">v1.0.0</span>
        </div>
      </div>
      <nav class="nav-menu">
        <!-- Dynamic links -->
      </nav>
      <div class="sidebar-footer">
        <div class="theme-display">
          <span>Dark Mode Active</span>
          <div class="glow-indicator"></div>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="workspace-header">
        <div class="title-area">
          <h2 id="tool-title">Image Converter</h2>
          <p id="tool-description" class="subtitle">Convert, resize, and compress images with pixel-perfect accuracy.</p>
        </div>
      </header>

      <div class="workspace-content">
        <div class="grid-layout">
          <div class="card drag-card">
            <div class="drop-zone" id="image-drop-zone">
              <input type="file" id="image-file-input" accept="image/*" class="file-hidden">
              <div class="drop-zone-content">
                <div class="upload-icon-wrapper">
                  <svg class="upload-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                </div>
                <h3>Drag & Drop Image</h3>
                <p>or click to browse your local files</p>
                <span class="file-limits">Supports PNG, JPEG, WebP, GIF</span>
              </div>
            </div>
            <div class="image-preview-container hidden" id="img-preview-container">
              <div class="preview-header">
                <span>Image Preview</span>
                <button class="icon-btn danger" id="btn-remove-image" title="Remove image">&times;</button>
              </div>
              <div class="preview-box">
                <img id="img-preview" src="" alt="Selected Preview">
              </div>
              <div class="image-meta">
                <div class="meta-item"><strong>Format:</strong> <span id="img-meta-format">-</span></div>
                <div class="meta-item"><strong>Size:</strong> <span id="img-meta-size">-</span></div>
                <div class="meta-item"><strong>Dimensions:</strong> <span id="img-meta-dims">-</span></div>
              </div>
            </div>
          </div>
          
          <div class="card settings-card">
            <h3>Conversion Settings</h3>
            <div class="settings-group">
              <label for="img-target-format">Target Format</label>
              <select id="img-target-format" class="styled-select">
                <option value="image/jpeg">JPEG (.jpg)</option>
                <option value="image/png" selected>PNG (.png)</option>
                <option value="image/webp">WebP (.webp)</option>
              </select>
            </div>
            
            <div class="settings-row">
              <div class="settings-group">
                <label for="img-width">Width (px)</label>
                <input type="number" id="img-width" class="styled-input" placeholder="Original">
              </div>
              <div class="settings-group">
                <label for="img-height">Height (px)</label>
                <input type="number" id="img-height" class="styled-input" placeholder="Original">
              </div>
            </div>
            
            <div class="settings-group aspect-group">
              <label class="checkbox-container">
                <input type="checkbox" id="img-aspect-ratio" checked>
                <span class="checkmark"></span>
                Lock Aspect Ratio
              </label>
            </div>

            <div class="settings-group" id="quality-slider-container">
              <div class="slider-header">
                <label for="img-quality">Quality</label>
                <span id="quality-value">92%</span>
              </div>
              <input type="range" id="img-quality" min="10" max="100" value="92" class="styled-slider">
            </div>

            <button class="btn btn-primary btn-full" id="btn-convert-image" disabled>
              <span>Convert & Download</span>
              <svg class="btn-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="./src/image.js?v=4"></script>
</body>
</html>
