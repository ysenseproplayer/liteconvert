<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteConvert - Dashboard</title>
  <meta name="description" content="Manage and access your conversion utilities from a single premium control dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
  
  <script type="importmap">
  {
    "imports": {
      "js-yaml": "https://esm.sh/js-yaml@4.1.0",
      "papaparse": "https://esm.sh/papaparse@5.4.1",
      "jspdf": "https://esm.sh/jspdf@2.5.1"
    }
  }
  </script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation (Populated by JS) -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">LC</div>
        <div class="brand-info">
          <h1>LiteConvert</h1>
          <span class="version-tag">v1.0.0</span>
        </div>
      </div>
      <nav class="nav-menu">
        <!-- JS populated links -->
      </nav>
      <div class="sidebar-footer">
        <div class="theme-display">
          <span>Dark Mode Active</span>
          <div class="glow-indicator"></div>
        </div>
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <header class="workspace-header">
        <div class="title-area">
          <h2 id="tool-title">Dashboard</h2>
          <p id="tool-description" class="subtitle">Access and manage high-performance format transformation utilities.</p>
        </div>
      </header>

      <div class="workspace-content">
        <!-- Quick stats metrics -->
        <div class="dashboard-grid">
          <div class="stat-card">
            <div class="stat-icon-wrapper">
              <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
            </div>
            <div class="stat-info">
              <h4>Total Conversions</h4>
              <div class="stat-number" id="stat-total-conversions">0</div>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon-wrapper success">
              <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <div class="stat-info">
              <h4>Active Tools</h4>
              <div class="stat-number" id="stat-active-tools">0 / 5</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon-wrapper warning">
              <svg class="stat-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <div class="stat-info">
              <h4>System Integrity</h4>
              <div class="stat-number">Online</div>
            </div>
          </div>
        </div>

        <!-- Available Tools showcase -->
        <div class="tools-showcase">
          <h3 class="tools-showcase-title">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            Available Conversion Engines
          </h3>
          
          <div class="tools-grid" id="tools-grid-container">
            <!-- Populated dynamically via JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./src/app.js?v=4"></script>
</body>
</html>
